<article class="app-article">
  <div class="app-description-and-title-container">
    <h2 class="app-title"><span class="app-title__span">{{titleText()}}</span></h2>
    <p class="app-description">{{descriptionText()}}</p>
  </div>
  <div class="app-dx-skill-details-frame">
    <div
      class="app-dx-skill-details-container"
      [class.app-dx-skill-details-container--transition]="dxSkillDetailsContainerTransitionCSSClassIsApplied()"
      [style]="dxSkillDetailsContainerStyle()"
    >
    </div>
  </div>
  <ul class="app-skills">
    @for (skill of skillsSummaryForTemplate(); track skill.codename) {
      <li class="app-skills__item">
        <app-dx-skill-card
          [titleAttribute]="skill.name"
        >
          <ng-container *ngTemplateOutlet="skillTemplate; context: { $implicit: skill.logotypeComponent }" />
        </app-dx-skill-card>
      </li>
    }
  </ul>
</article>


<ng-template #skillTemplate let-logotypeComponent>
  <ng-container *ngComponentOutlet="logotypeComponent" />
</ng-template>
